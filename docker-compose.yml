version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: doctor-assistant-backend
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.7}
      - DATABASE_URL=sqlite:///./medical.db
    volumes:
      # Persist database
      - ./backend/medical.db:/app/medical.db
      # Persist reports
      - ./backend/reports:/app/reports
      # Persist RAG index
      - ./backend/data:/app/data
      # Mount ML models (read-only)
      - ./backend/app/ml_models:/app/app/ml_models:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - doctor-assistant-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=http://localhost:8000
    container_name: doctor-assistant-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - doctor-assistant-network

networks:
  doctor-assistant-network:
    driver: bridge

