version: '3.8'

# Production docker-compose using images from Docker Hub
# Usage: docker-compose -f docker-compose.prod.yml up -d

services:
  backend:
    image: ${DOCKER_HUB_USERNAME:-yourusername}/doctor-assistant-backend:latest
    container_name: doctor-assistant-backend
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.7}
      - DATABASE_URL=sqlite:///./medical.db
    volumes:
      - ./backend/medical.db:/app/medical.db
      - ./backend/reports:/app/reports
      - ./backend/data:/app/data
      - ./backend/app/ml_models:/app/app/ml_models:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - doctor-assistant-network

  frontend:
    image: ${DOCKER_HUB_USERNAME:-yourusername}/doctor-assistant-frontend:latest
    container_name: doctor-assistant-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - doctor-assistant-network

networks:
  doctor-assistant-network:
    driver: bridge

